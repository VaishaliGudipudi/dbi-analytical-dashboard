services:
  - type: web
    name: bioinsights-copilot-backend
    runtime: python
    rootDir: assistant-core
    buildCommand: pip install -r requirements.txt
    startCommand: python web/server.py
    healthCheckPath: /health
    envVars:
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_MODEL
        value: gpt-4o-mini
